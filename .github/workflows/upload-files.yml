name: Upload Large Files

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/upload-files.yml'

jobs:
  upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download and commit large files
        run: |
          curl -L "https://tmpfiles.org/dl/26946232/retrolesson-preview.jpg" -o retrolesson-preview.jpg
          curl -L "https://tmpfiles.org/dl/26946241/codenews-preview.png" -o codenews-preview.png
          curl -L "https://tmpfiles.org/dl/26946253/main.75df0953.js.txt" -o static/js/main.75df0953.js
          ls -la retrolesson-preview.jpg codenews-preview.png static/js/main.75df0953.js
          git config user.email "135287990+MatheusMarques13@users.noreply.github.com"
          git config user.name "MatheusMarques13"
          git add retrolesson-preview.jpg codenews-preview.png static/js/main.75df0953.js
          git diff --cached --stat
          git commit -m "Add RetroLesson and CodeNews projects" || echo "Nothing to commit"
          git push
