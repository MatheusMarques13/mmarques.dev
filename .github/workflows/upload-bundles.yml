name: Upload Bundles

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/upload-bundles.yml'
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download JS bundle
        run: |
          curl -L -o static/js/main.c6fe6db3.js \
            "http://tmpfiles.org/dl/26949036/main.c6fe6db3.txt"

      - name: Download CSS bundle
        run: |
          curl -L -o static/css/main.d5adb21a.css \
            "http://tmpfiles.org/dl/26949028/main.d5adb21a.css"

      - name: Write LICENSE.txt
        run: |
          cat > static/js/main.c6fe6db3.js.LICENSE.txt << 'LICENSEOF'
          /**
           * @license React
           * react-dom-client.production.js
           *
           * Copyright (c) Meta Platforms, Inc. and affiliates.
           *
           * This source code is licensed under the MIT license found in the
           * LICENSE file in the root directory of this source tree.
           */
          
          /**
           * @license React
           * react-dom.production.js
           *
           * Copyright (c) Meta Platforms, Inc. and affiliates.
           *
           * This source code is licensed under the MIT license found in the
           * LICENSE file in the root directory of this source tree.
           */
          
          /**
           * @license React
           * react-jsx-runtime.production.js
           *
           * Copyright (c) Meta Platforms, Inc. and affiliates.
           *
           * This source code is licensed under the MIT license found in the
           * LICENSE file in the root directory of this source tree.
           */
          
          /**
           * @license React
           * react.production.js
           *
           * Copyright (c) Meta Platforms, Inc. and affiliates.
           *
           * This source code is licensed under the MIT license found in the
           * LICENSE file in the root directory of this source tree.
           */
          
          /**
           * @license React
           * scheduler.production.js
           *
           * Copyright (c) Meta Platforms, Inc. and affiliates.
           *
           * This source code is licensed under the MIT license found in the
           * LICENSE file in the root directory of this source tree.
           */
          
          /**
           * @license lucide-react v0.507.0 - ISC
           *
           * This source code is licensed under the ISC license.
           * See the LICENSE file in the root directory of this source tree.
           */
          LICENSEOF

      - name: Write index.html
        run: |
          cat > index.html << 'INDEXEOF'
          <!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><meta name="theme-color" content="#151515"/><meta name="description" content="Matheus Marques - Software Engineer &amp; Robotics Teacher Portfolio"/><link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/><title>Matheus Marques | Portfolio</title><script defer="defer" src="./static/js/main.c6fe6db3.js"></script><link href="./static/css/main.d5adb21a.css" rel="stylesheet"></head><body><noscript>You need to enable JavaScript to run this app.</noscript><div id="root"></div></body></html>
          INDEXEOF

      - name: Write asset-manifest.json
        run: |
          cat > asset-manifest.json << 'MANIFESTEOF'
          {
            "files": {
              "main.css": "./static/css/main.d5adb21a.css",
              "main.js": "./static/js/main.c6fe6db3.js",
              "index.html": "./index.html",
              "main.d5adb21a.css.map": "./static/css/main.d5adb21a.css.map",
              "main.c6fe6db3.js.map": "./static/js/main.c6fe6db3.js.map"
            },
            "entrypoints": [
              "static/css/main.d5adb21a.css",
              "static/js/main.c6fe6db3.js"
            ]
          }
          MANIFESTEOF

      - name: Delete old JS bundle
        run: rm -f static/js/main.75df0953.js

      - name: Delete old JS LICENSE
        run: rm -f static/js/main.75df0953.js.LICENSE.txt

      - name: Delete old CSS bundle
        run: rm -f static/css/main.283f008c.css

      - name: Commit all changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git status
          git diff --cached --name-only
          git commit -m "Add language selector with 6 languages" || echo "Nothing to commit"
          git push

      - name: Delete this workflow
        run: |
          git rm .github/workflows/upload-bundles.yml
          git commit -m "Remove temporary upload workflow"
          git push
