name: Deploy Static Assets

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/deploy-assets.yml'

jobs:
  deploy-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download CSS and JS assets
        run: |
          mkdir -p static/css static/js
          curl -fsSL https://7777-i5n7pcg7hnsqx8l1h4blt.e2b.app/css/main.283f008c.css -o static/css/main.283f008c.css
          curl -fsSL https://7777-i5n7pcg7hnsqx8l1h4blt.e2b.app/js/main.8bead756.js -o static/js/main.8bead756.js
          echo "CSS size: $(wc -c < static/css/main.283f008c.css) bytes"
          echo "JS size: $(wc -c < static/js/main.8bead756.js) bytes"

      - name: Commit and push assets
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add static/css/main.283f008c.css static/js/main.8bead756.js
          git diff --staged --stat
          git commit -m 'Add CSS and JS static assets' || echo 'No changes to commit'
          git push
