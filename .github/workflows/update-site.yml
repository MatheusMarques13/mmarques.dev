name: Update Site
on: workflow_dispatch
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download files
        run: |
          BASE="https://7777-i5n7pcg7hnsqx8l1h4blt.e2b.app"
          
          # Remove old static files
          rm -rf static/
          
          # Download all files
          curl -sL "$BASE/index.html" -o index.html
          curl -sL "$BASE/asset-manifest.json" -o asset-manifest.json
          curl -sL "$BASE/retromynd-preview.jpg" -o retromynd-preview.jpg
          curl -sL "$BASE/CNAME" -o CNAME
          touch .nojekyll
          
          mkdir -p static/css static/js
          curl -sL "$BASE/static/css/main.283f008c.css" -o static/css/main.283f008c.css
          curl -sL "$BASE/static/js/main.ec3e7d53.js" -o static/js/main.ec3e7d53.js
          curl -sL "$BASE/static/js/main.ec3e7d53.js.LICENSE.txt" -o static/js/main.ec3e7d53.js.LICENSE.txt
      - name: Commit and push
        run: |
          git config user.name "MatheusMarques13"
          git config user.email "matheusbmarques13@gmail.com"
          git add -A
          git commit -m "Update portfolio with Retromynd project" || echo "No changes"
          git push
