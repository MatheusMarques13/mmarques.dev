name: Deploy Portfolio Update
on:
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download and update files
        run: |
          BASE_URL="https://7777-i5n7pcg7hnsqx8l1h4blt.e2b.dev"
          
          # Download main files
          curl -sL "$BASE_URL/index.html" -o index.html
          curl -sL "$BASE_URL/asset-manifest.json" -o asset-manifest.json
          curl -sL "$BASE_URL/CNAME" -o CNAME
          
          # Download images
          curl -sL "$BASE_URL/retromynd-preview.jpg" -o retromynd-preview.jpg
          curl -sL "$BASE_URL/retrolesson-preview.jpg" -o retrolesson-preview.jpg
          curl -sL "$BASE_URL/codenews-preview.png" -o codenews-preview.png
          
          # Create .nojekyll
          touch .nojekyll
          
          # Download static assets
          mkdir -p static/css static/js
          curl -sL "$BASE_URL/static/css/main.283f008c.css" -o static/css/main.283f008c.css
          curl -sL "$BASE_URL/static/css/main.283f008c.css.map" -o static/css/main.283f008c.css.map
          curl -sL "$BASE_URL/static/js/main.75df0953.js" -o static/js/main.75df0953.js
          curl -sL "$BASE_URL/static/js/main.75df0953.js.LICENSE.txt" -o static/js/main.75df0953.js.LICENSE.txt
          curl -sL "$BASE_URL/static/js/main.75df0953.js.map" -o static/js/main.75df0953.js.map
          
          # Clean up old JS files that may no longer be needed
          find static/js -name "*.js" ! -name "main.75df0953.js" ! -name "main.75df0953.js.map" ! -name "main.75df0953.js.LICENSE.txt" -delete 2>/dev/null || true
          
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add RetroLesson and CodeNews projects" || echo "No changes"
          git push
